# In-cluster Apache Kafka (KRaft mode, PLAINTEXT, single-node) for the E2E
# test. Not production: no PVC, replication factor 1, no resource limits.
# Advertised listener is `kafka:9092` (Service DNS), which is resolvable
# from any pod in the same namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        # Kafka writes KRaft logs and metadata under /tmp and /var, and the
        # apache/kafka entrypoint rewrites server.properties in
        # /opt/kafka/config — all must be writable under
        # readOnlyRootFilesystem=true. kafka-config is seeded by the
        # initContainer below from the image's baked-in defaults.
        - name: tmp
          emptyDir: {}
        - name: var
          emptyDir: {}
        - name: kafka-config
          emptyDir: {}
        - name: kafka-logs
          emptyDir: {}
      initContainers:
        - name: seed-config
          image: apache/kafka:3.9.0
          imagePullPolicy: IfNotPresent
          command: ['sh', '-c', 'cp -r /opt/kafka/config/. /mnt/config/']
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: kafka-config
              mountPath: /mnt/config
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var
              mountPath: /var
            - name: kafka-config
              mountPath: /opt/kafka/config
            - name: kafka-logs
              mountPath: /opt/kafka/logs
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9093
              name: controller
          env:
            - { name: KAFKA_NODE_ID,                                  value: "1" }
            - { name: KAFKA_PROCESS_ROLES,                            value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS,                 value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS,                                value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS,                     value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP,           value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES,                value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME,               value: "PLAINTEXT" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR,         value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR,            value: "1" }
            - { name: KAFKA_LOG_DIRS,                                 value: "/tmp/kraft-combined-logs" }
            - { name: CLUSTER_ID,                                     value: "MkU3OEVBNTcwNTJENDM2Qk" }
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  type: ClusterIP
