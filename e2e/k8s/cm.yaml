# ConfigMap consumed by the consumer Deployment:
#   - KAFKA_CONFIG_FILE + KAFKA_TOPIC: env-var values (configMapKeyRef)
#   - kafka.properties: mounted at /app/kafka.properties via volume
# PLAINTEXT-only; points at the in-cluster broker at kafka:9092.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
data:
  KAFKA_CONFIG_FILE: "/app/kafka.properties"
  KAFKA_TOPIC: "e2e-topic"
  kafka.properties: |
    bootstrap.servers=kafka:9092
    security.protocol=PLAINTEXT
